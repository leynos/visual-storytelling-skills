name: Release Wheels

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read


jobs:

  pure-wheel:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: ./tools/media-project/.github/actions/pure-python-wheel
        with:
          python-version: '3.14'
          artifact-name: wheels-pure

  release:
    # This project has no C or Rust extensions, so cross-platform
    # builds are unnecessary. Only the pure Python wheel is published.
    needs:
      - pure-wheel
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-pure
          path: dist
      - name: Upload wheels to release
        run: |
          set -eu
          if ! find dist/wheels-* -type f -name "*.whl" | grep -q .; then
            echo "No wheel files found"
            exit 1
          fi
          find dist/wheels-* -type f -name "*.whl" -print0 | \
            xargs -0 -r gh release upload "${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
